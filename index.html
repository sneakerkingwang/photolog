<script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater-image-module/3.1.1/docxtemplater-image-module.js"></script>

<script>
    let photoData = [];

    function renderPhotoInputs() {
        const files = document.getElementById('photos').files;
        const container = document.getElementById('photo-list');
        container.innerHTML = '';
        photoData = [];

        Array.from(files).forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                // We store the base64 data for the image module
                photoData.push({ 
                    base64: e.target.result.split(',')[1], 
                    name: file.name 
                });
                
                const div = document.createElement('div');
                div.className = 'photo-entry';
                div.innerHTML = `
                    <strong>Photo ${index + 1}: ${file.name}</strong><br>
                    <input type="text" placeholder="Description..." id="desc-${index}" style="width:70%">
                    <select id="dir-${index}">
                        <option value="North">North</option>
                        <option value="South">South</option>
                        <option value="East">East</option>
                        <option value="West">West</option>
                        <option value="Downwards">Downwards</option>
                    </select>
                `;
                container.appendChild(div);
            };
            reader.readAsDataURL(file); // Changed to DataURL for easier image handling
        });
    }

    function generateDocument() {
        const templateFile = document.getElementById('template').files[0];
        if (!templateFile) return alert("Please upload a template first.");

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const zip = new PizZip(content);
            
            // Initialize the Image Module
            const opts = {
                centered: false,
                getImage: function(tagValue) {
                    return b64DecodeUnicode(tagValue);
                },
                getSize: function() {
                    return [300, 225]; // Sets image size in the Word Doc (pixels)
                }
            };
            const imageModule = new window.ImageModule(opts);

            const doc = new window.docxtemplater(zip, { 
                modules: [imageModule],
                paragraphLoop: true, 
                linebreaks: true 
            });

            // Prepare the data for the template
            const tags = {
                photos: photoData.map((photo, i) => ({
                    image: photo.base64,
                    caption: document.getElementById(`desc-${i}`).value,
                    direction: document.getElementById(`dir-${i}`).value
                }))
            };

            try {
                doc.render(tags);
            } catch (error) {
                console.log(error);
                return alert("Error rendering template. Make sure your tags {image}, {caption}, and {direction} are correct.");
            }

            const out = doc.getZip().generate({
                type: "blob",
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
            });
            saveAs(out, "10931_CAMU_Photo_Log_Generated.docx");
        };
        reader.readAsArrayBuffer(templateFile);
    }

    // Helper function for the image module
    function b64DecodeUnicode(str) {
        return Uint8Array.from(atob(str), c => c.charCodeAt(0));
    }
</script>
