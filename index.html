<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Photo Log Generator</title>
    
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.4/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.29.4/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater-image-module-free@1.1.1/build/imagemodule.js"></script>

    <style>
        /* Modern, clean typography and background */
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background-color: #f0f4f8; color: #334155; }
        h1 { color: #0f172a; font-weight: 700; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 30px; }
        
        /* Sleek Card Design */
        .card { background: white; border: none; padding: 25px 30px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; color: #334155; font-size: 1.1rem; }
        .card p { color: #64748b; font-size: 0.95rem; margin-bottom: 15px; }
        
        /* Photo Entry Row Layout */
        .photo-entry { background: #f8fafc; border: 1px solid #e2e8f0; border-left: 5px solid #3b82f6; padding: 15px; margin-bottom: 15px; border-radius: 8px; display: flex; gap: 20px; align-items: flex-start; transition: transform 0.2s ease; }
        .photo-entry:hover { transform: translateX(2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        /* Image Thumbnail */
        .thumbnail { width: 120px; height: 90px; object-fit: cover; border-radius: 6px; border: 1px solid #cbd5e1; flex-shrink: 0; background: #e2e8f0; }
        
        /* Form Controls */
        .entry-content { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; }
        .controls { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
        .controls-left { display: flex; gap: 8px; align-items: center; }
        .controls strong { font-size: 0.95rem; color: #0f172a; margin-left: 5px; }
        
        /* Buttons */
        button { cursor: pointer; border-radius: 6px; font-weight: 500; transition: all 0.2s ease; }
        button.move { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; padding: 6px 12px; font-size: 13px; }
        button.move:hover { background: #cbd5e1; color: #0f172a; }
        button.delete { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; padding: 6px 12px; font-size: 13px; }
        button.delete:hover { background: #fecaca; color: #b91c1c; }
        
        /* Inputs */
        input[type="text"], select, input[type="file"] { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.95rem; color: #334155; box-sizing: border-box; background-color: white; transition: border-color 0.2s; }
        input[type="text"]:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        /* Main Generate Button */
        .btn-main { background: #10b981; color: white; border: none; padding: 18px; width: 100%; font-size: 18px; font-weight: 700; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2); margin-bottom: 30px; letter-spacing: 0.5px; }
        .btn-main:hover:not(:disabled) { background: #059669; transform: translateY(-1px); box-shadow: 0 6px 8px -1px rgba(16, 185, 129, 0.3); }
        .btn-main:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        
        /* Footer */
        .footer { text-align: center; color: #64748b; font-size: 14px; padding-top: 20px; border-top: 1px solid #cbd5e1; }
        .footer a { color: #3b82f6; text-decoration: none; font-weight: 500; }
        .footer a:hover { text-decoration: underline; color: #2563eb; }
    </style>
</head>
<body>

    <h1>Site Photo Log Generator</h1>

    <div class="card">
        <h3>1. Template Setup</h3>
        <p>Upload your <code>.docx</code> template file, then select which layout type it uses.</p>
        <input type="file" id="template" accept=".docx">
        
        <select id="templateType" style="margin-top: 15px;">
            <option value="single">Single Photo Template (Continuous List)</option>
            <option value="grid">2x2 Grid Template (4 Photos per Page)</option>
        </select>
    </div>

    <div class="card">
        <h3>2. Organize Photos</h3>
        <p>Upload photos, set their directions, and add descriptive captions.</p>
        <input type="file" id="photos" multiple accept="image/*" onchange="addPhotos()">
        <div id="list" style="margin-top:25px;"></div>
    </div>

    <button id="generateBtn" class="btn-main" onclick="generate()">Generate & Download Report</button>

    <div class="footer">
        <p>Created by <strong>Michael Wang</strong></p>
        <p>Questions? Email <a href="mailto:zwang@gsi-net.com">zwang@gsi-net.com</a> or call <strong>979-551-5334</strong></p>
        <p id="lastUpdated" style="font-size: 12px; margin-top: 10px; color: #94a3b8;"></p>
    </div>

    <script>
        document.getElementById('lastUpdated').innerText = "Last Updated: " + document.lastModified;

        const originalDescriptor = Object.getOwnPropertyDescriptor(Element.prototype, 'namespaceURI');
        if (originalDescriptor && !originalDescriptor.set) {
            Object.defineProperty(Element.prototype, 'namespaceURI', {
                get: originalDescriptor.get,
                set: function() {},
                enumerable: originalDescriptor.enumerable,
                configurable: true
            });
        }

        let photoData = [];

        async function addPhotos() {
            const files = Array.from(document.getElementById('photos').files);
            if (files.length === 0) return;

            const filePromises = files.map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        resolve({ 
                            base64: e.target.result.split(',')[1], 
                            name: file.name, 
                            caption: '', 
                            dir: '' 
                        });
                    };
                    reader.readAsDataURL(file);
                });
            });

            const orderedPhotos = await Promise.all(filePromises);
            photoData.push(...orderedPhotos);
            render();
            document.getElementById('photos').value = '';
        }

        function move(idx, step) {
            const target = idx + step;
            if (target >= 0 && target < photoData.length) {
                [photoData[idx], photoData[target]] = [photoData[target], photoData[idx]];
                render();
            }
        }

        // NEW FEATURE: Remove individual photos
        function removePhoto(idx) {
            photoData.splice(idx, 1);
            render();
        }

        // UPDATED: Added thumbnail image and delete button to the HTML layout
        function render() {
            const container = document.getElementById('list');
            container.innerHTML = '';
            photoData.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'photo-entry';
                div.innerHTML = `
                    <img src="data:image/jpeg;base64,${p.base64}" class="thumbnail" alt="Preview">
                    <div class="entry-content">
                        <div class="controls">
                            <div class="controls-left">
                                <button class="move" onclick="move(${i}, -1)">▲</button>
                                <button class="move" onclick="move(${i}, 1)">▼</button>
                                <strong>Photo ${i + 1}: ${p.name}</strong>
                            </div>
                            <button class="delete" onclick="removePhoto(${i})">🗑️ Remove</button>
                        </div>
                        <select onchange="photoData[${i}].dir = this.value">
                            <option value="">Select Direction</option>
                            <option value="Facing North" ${p.dir === 'Facing North' ? 'selected' : ''}>Facing North</option>
                            <option value="Facing NE" ${p.dir === 'Facing NE' ? 'selected' : ''}>Facing NE</option>
                            <option value="Facing East" ${p.dir === 'Facing East' ? 'selected' : ''}>Facing East</option>
                            <option value="Facing SE" ${p.dir === 'Facing SE' ? 'selected' : ''}>Facing SE</option>
                            <option value="Facing South" ${p.dir === 'Facing South' ? 'selected' : ''}>Facing South</option>
                            <option value="Facing SW" ${p.dir === 'Facing SW' ? 'selected' : ''}>Facing SW</option>
                            <option value="Facing West" ${p.dir === 'Facing West' ? 'selected' : ''}>Facing West</option>
                            <option value="Facing NW" ${p.dir === 'Facing NW' ? 'selected' : ''}>Facing NW</option>
                            <option value="Facing Downwards" ${p.dir === 'Facing Downwards' ? 'selected' : ''}>Facing Downwards</option>
                        </select>
                        <input type="text" placeholder="Type a description or caption for this photo..." value="${p.caption}" oninput="photoData[${i}].caption = this.value">
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function generate() {
            const fileInput = document.getElementById('template').files[0];
            if (!fileInput || photoData.length === 0) {
                return alert("Please upload both a Word template and at least one photo.");
            }

            // Visual feedback: Disable button while generating
            const btn = document.getElementById('generateBtn');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "Processing Document... Please Wait";

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const zip = new window.PizZip(e.target.result);
                    const ImageModule = window.ImageModule || window.docxtemplaterImageModule;

                    const templateType = document.getElementById('templateType').value;

                    let imgDimensions = [700, 525]; 
                    if (templateType === 'grid') {
                        imgDimensions = [280, 210]; 
                    }

                    const imageOptions = {
                        centered: true, 
                        getImage: (v) => {
                            const bin = window.atob(v);
                            const res = new Uint8Array(bin.length);
                            for (let i = 0; i < bin.length; i++) res[i] = bin.charCodeAt(i);
                            return res.buffer;
                        },
                        getSize: () => imgDimensions 
                    };

                    const doc = new window.docxtemplater(zip, {
                        modules: [new ImageModule(imageOptions)],
                        paragraphLoop: true,
                        linebreaks: true
                    });

                    const formattedPhotos = photoData.map((p, i) => ({
                        index: i + 1,
                        image: p.base64,
                        caption: p.caption || "No description provided.",
                        direction: p.dir
                    }));

                    let dataToRender = {};

                    if (templateType === 'single') {
                        dataToRender = { photos: formattedPhotos };
                    } else if (templateType === 'grid') {
                        const pages = [];
                        for (let i = 0; i < formattedPhotos.length; i += 4) {
                            pages.push({
                                p1: formattedPhotos[i] ? [formattedPhotos[i]] : false,
                                p2: formattedPhotos[i+1] ? [formattedPhotos[i+1]] : false,
                                p3: formattedPhotos[i+2] ? [formattedPhotos[i+2]] : false,
                                p4: formattedPhotos[i+3] ? [formattedPhotos[i+3]] : false
                            });
                        }
                        dataToRender = { pages: pages };
                    }

                    doc.render(dataToRender);

                    const out = doc.getZip().generate({ 
                        type: "blob", 
                        mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" 
                    });
                    saveAs(out, "Site_Photo_Log.docx");

                } catch (err) {
                    console.error(err);
                    alert("Technical Error: " + err.message);
                } finally {
                    // Re-enable the button
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            };
            reader.readAsArrayBuffer(fileInput);
        }
    </script>
</body>
</html>
